            <h2>Quick Estimate Calculator</h2>

            <div class="calculator-card">

                <div class="calc-form">

                    <div class="form-group">
                        <label for="calc-env">Surface Type</label>
                        <select id="calc-env">
                            <option value="driveway">Driveway — $0.18 / sq ft</option>

                        <div class="form-group">
                            <label for="calc-length">Length (ft)</label>
                            <input type="number" id="calc-length" min="1" max="9999" placeholder="e.g. 30" />

                    </div>

                    <button id="calc-btn" onclick="calculateEstimate()">Calculate Estimate</button>

                <div class="calc-result" id="calc-result" aria-live="polite">

                        <span class="result-label">Surface area</span>

                    <div class="result-row">

                        <span class="result-value" id="res-rate">—</span>

                    </div>
